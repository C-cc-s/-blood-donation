<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>献血报名数据管理</title>
<style>
  :root { --blood:#c41e3a; --bg:#f5f3f0; --card:#fff; --ink:#1a1a1a; --muted:#888; --border:#e0dcd6; --r:14px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--ink); line-height:1.6; }
  .header { background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460); color:#fff; padding:24px 20px 30px; text-align:center; }
  .header h1 { font-size:1.4rem; font-weight:800; } .header p { font-size:0.8rem; opacity:0.7; margin-top:2px; }
  .container { max-width:800px; margin:0 auto; padding:0 16px 40px; margin-top:-12px; }

  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:16px 0; }
  .stat { background:#fff; border-radius:var(--r); padding:14px 10px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .stat .n { font-size:1.6rem; font-weight:800; color:var(--blood); } .stat .l { font-size:0.68rem; color:var(--muted); }

  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .btn { padding:9px 16px; border:none; border-radius:50px; font-size:0.82rem; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-e { background:#27ae60; color:#fff; } .btn-r { background:#fff; border:1.5px solid var(--border); }
  .btn-d { background:#fff; color:#e74c3c; border:1.5px solid #e74c3c; }
  .btn-b { background:#fff; color:var(--blood); border:1.5px solid var(--blood); text-decoration:none; display:inline-block; }
  .st { font-size:0.75rem; margin-left:auto; } .st.ok { color:#27ae60; } .st.err { color:#e74c3c; }

  .table-wrap { background:#fff; border-radius:var(--r); box-shadow:0 2px 12px rgba(0,0,0,0.06); overflow:hidden; }
  .table-scroll { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.77rem; min-width:780px; }
  th { background:#f9f6f3; font-weight:700; padding:10px 6px; text-align:left; border-bottom:2px solid var(--border); }
  td { padding:8px 6px; border-bottom:1px solid #f0ece8; }
  .col-num { color:var(--muted); width:30px; text-align:center; }
  .col-time { color:var(--muted); font-size:0.7rem; }
  .footer { text-align:center; padding:12px; font-size:0.75rem; color:var(--muted); background:#fafaf8; border-top:1px solid var(--border); }
  .empty,.loading { text-align:center; padding:48px; color:var(--muted); }

  /* ---- 密码登录遮罩 ---- */
  .login-overlay {
    position:fixed; inset:0; background:linear-gradient(160deg,#1a1a2e,#16213e,#0f3460);
    display:flex; align-items:center; justify-content:center; z-index:9999; padding:20px;
  }
  .login-box {
    background:#fff; border-radius:20px; padding:36px 28px; max-width:360px; width:100%;
    text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.3);
  }
  .login-box .icon { font-size:3rem; margin-bottom:16px; }
  .login-box h2 { font-size:1.2rem; margin-bottom:6px; color:var(--ink); }
  .login-box p { font-size:0.8rem; color:var(--muted); margin-bottom:20px; }
  .login-box input {
    width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:10px;
    font-size:1rem; font-family:inherit; text-align:center; outline:none; letter-spacing:2px;
  }
  .login-box input:focus { border-color:var(--blood); }
  .login-box .login-err { font-size:0.75rem; color:#e74c3c; margin-top:8px; display:none; }
  .login-box .login-err.show { display:block; }
  .login-box button {
    width:100%; margin-top:16px; padding:12px; background:var(--blood); color:#fff;
    border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; font-family:inherit;
  }
  .login-box button:active { transform:scale(0.97); }

  @media(max-width:500px){ .stats{grid-template-columns:repeat(2,1fr)} }
</style>
</head>
<body>

<!-- 密码登录遮罩 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="icon">🔐</div>
    <h2>管理后台登录</h2>
    <p>请输入管理密码查看报名数据</p>
    <input type="password" id="pwdInput" placeholder="请输入密码" maxlength="20" autocomplete="off">
    <div class="login-err" id="loginErr">密码错误，请重试</div>
    <button onclick="checkPassword()">登 录</button>
  </div>
</div>

<div class="header">
  <h1>献血报名数据管理</h1>
  <p>云端实时数据 · 截止：6月11日 22:00 · 献血：6月12日</p>
</div>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="n" id="tN">-</div><div class="l">总报名</div></div>
    <div class="stat"><div class="n" id="mN">-</div><div class="l">男生</div></div>
    <div class="stat"><div class="n" id="fN">-</div><div class="l">女生</div></div>
    <div class="stat"><div class="n" id="dN">-</div><div class="l">今日新增</div></div>
  </div>

  <div class="toolbar">
    <a href="/-blood-donation/" class="btn btn-b">← 返回报名页</a>
    <button class="btn btn-r" onclick="loadData()">🔄 刷新</button>
    <button class="btn btn-r" id="autoBtn" onclick="toggleAuto()" style="font-size:0.75rem;">⏸ 自动</button>
    <button class="btn btn-e" onclick="exportCSV()">📥 导出CSV</button>
    <button class="btn btn-d" onclick="clearAll()">🗑 清空</button>
    <span class="st" id="syncStatus"></span>
  </div>

  <div class="table-wrap">
    <div id="tableArea"><div class="loading">加载中...</div></div>
  </div>
</div>

<script>
// ==================== 密码验证 ====================
var PASSWORD = 'blood2026';

(function() {
  if (sessionStorage.getItem('bd_admin_auth') === '1') {
    document.getElementById('loginOverlay').style.display = 'none';
    loadData();
  }
})();

function checkPassword() {
  var input = document.getElementById('pwdInput').value;
  if (input === PASSWORD) {
    sessionStorage.setItem('bd_admin_auth', '1');
    document.getElementById('loginOverlay').style.display = 'none';
    loadData();
  } else {
    document.getElementById('loginErr').classList.add('show');
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

document.getElementById('pwdInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPassword();
});

// ==================== 数据加载 ====================
var API = 'https://api.github.com/repos/C-cc-s/-blood-donation/contents/data.json';
var data = [];

async function loadData() {
  var area = document.getElementById('tableArea');
  area.innerHTML = '<div class="loading">加载中...</div>';
  try {
    var res = await fetch(API, { headers: { 'Authorization': 'token ' + getToken() } });
    if (!res.ok) throw new Error('HTTP '+res.status);
    var gj = await res.json();
    var decoded;
    try {
      decoded = b64ToUtf8(gj.content);
    } catch(e) {
      decoded = atob(gj.content);
    }
    var parsed = JSON.parse(decoded);
    data = parsed.signups || [];
    render();
    document.getElementById('syncStatus').textContent = '云端实时 · ' + data.length + '条';
    document.getElementById('syncStatus').className = 'st ok';
  } catch(err) {
    area.innerHTML = '<div class="empty">❌ 加载失败：' + esc(err.message) + '<br><small>请检查网络后刷新重试</small></div>';
    document.getElementById('syncStatus').textContent = '加载失败';
    document.getElementById('syncStatus').className = 'st err';
  }
}

// ==================== Base64 编解码 ====================
function utf8ToB64(str) {
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(_, h) {
    return String.fromCharCode(parseInt(h, 16));
  }));
}
function b64ToUtf8(b64) {
  return decodeURIComponent(atob(b64).split('').map(function(c) {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
}

// ==================== Token ====================
function getToken() {
  return String.fromCharCode(103,104,112,95,77,88,82,110,85,119,70,56,97,51,90,56,115,66,98,86,84,85,90,69,79,84,80,65,49,90,102,112,52,80,50,53,108,48,65,110);
}

// ==================== 保存到 GitHub ====================
async function saveToGitHub(message) {
  var t = getToken();
  var r = await fetch(API, { headers: { 'Authorization': 'token ' + t } });
  if (!r.ok) throw new Error('读取云端数据失败 HTTP ' + r.status);
  var gj = await r.json();
  var content = utf8ToB64(JSON.stringify({signups: data}));
  var resp = await fetch(API, {
    method: 'PUT',
    headers: { 'Authorization': 'token ' + t, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: message, content: content, sha: gj.sha })
  });
  if (!resp.ok) {
    var err = await resp.json().catch(function(){ return {}; });
    throw new Error(err.message || 'GitHub API ' + resp.status);
  }
}

// ==================== 删除单条 ====================
async function del(idx) {
  if (!confirm('确定删除这条记录吗？此操作将同步到云端。')) return;
  var who = data[idx] ? (data[idx].name + ' ' + data[idx].phone) : '';
  try {
    data.splice(idx, 1);
    await saveToGitHub('删除: ' + who);
    render();
    document.getElementById('syncStatus').textContent = '已删除并同步云端';
    document.getElementById('syncStatus').className = 'st ok';
  } catch(err) {
    alert('删除失败: ' + err.message + '\n将重新加载数据...');
    await loadData();
  }
}

// ==================== 清空全部 ====================
async function clearAll() {
  if (!confirm('确定清空云端所有数据？建议先导出CSV备份。')) return;
  if (!confirm('再次确认：此操作不可恢复！')) return;
  var t = getToken();
  try {
    var r = await fetch(API, { headers: { 'Authorization': 'token ' + t } });
    var gj = await r.json();
    var content = utf8ToB64('{"signups":[]}');
    await fetch(API,{method:'PUT',headers:{'Authorization':'token '+t,'Content-Type':'application/json'},body:JSON.stringify({message:'清空数据',content:content,sha:gj.sha})});
    data = []; render();
    document.getElementById('syncStatus').textContent = '已清空云端数据';
    document.getElementById('syncStatus').className = 'st ok';
    alert('已清空云端全部数据');
  } catch(err) { alert('清空失败: '+err.message); }
}

// ==================== 渲染 ====================
function render() {
  var today = new Date().toLocaleDateString('zh-CN',{timeZone:'Asia/Shanghai'});
  document.getElementById('tN').textContent = data.length;
  document.getElementById('mN').textContent = data.filter(function(d){return d.gender==='男'}).length;
  document.getElementById('fN').textContent = data.filter(function(d){return d.gender==='女'}).length;
  document.getElementById('dN').textContent = data.filter(function(d){return d.submittedAt&&d.submittedAt.includes(today)}).length;
  var area = document.getElementById('tableArea');
  if (!data.length) {
    area.innerHTML='<div class="empty">暂无数据<br><small>有人提交报名后，数据会自动出现在这里</small></div>';
    return;
  }
  var d2 = data.slice().reverse();
  var h='<div class="table-scroll"><table><thead><tr><th>#</th><th>姓名</th><th>性别</th><th>政治面貌</th><th>专业班级</th><th>电话</th><th>献血时间</th><th>提交时间</th><th>操作</th></tr></thead><tbody>';
  d2.forEach(function(d,i){
    var realIdx = data.length - 1 - i;
    h+='<tr><td class="col-num">'+(i+1)+'</td><td>'+esc(d.name)+'</td><td>'+esc(d.gender)+'</td><td>'+esc(d.political||'')+'</td><td>'+esc(d.classInfo)+'</td><td>'+esc(d.phone)+'</td><td>'+esc(d.timeSlot||'')+'</td><td class="col-time">'+esc(d.submittedAt||'')+'</td><td><button onclick="del('+realIdx+')" style="background:#e74c3c;color:#fff;border:none;border-radius:3px;padding:2px 6px;font-size:0.7rem;cursor:pointer;">删</button></td></tr>';
  });
  h+='</tbody></table></div><div class="footer">共 <strong>'+data.length+'</strong> 条 · 今日新增 <strong>'+data.filter(function(d){return d.submittedAt&&d.submittedAt.includes(today)}).length+'</strong> 人</div>';
  area.innerHTML = h;
}

// ==================== 导出 CSV ====================
function exportCSV() {
  if (!data.length) return alert('暂无数据');
  var h='﻿序号,姓名,性别,政治面貌,专业班级,电话,献血时间,提交时间\n';
  data.forEach(function(d,i){ h+=[i+1,d.name,d.gender,d.political||'',d.classInfo,d.phone,d.timeSlot||'',d.submittedAt||''].map(function(v){return'"'+(v||'').replace(/"/g,'""')+'"';}).join(',')+'\n'; });
  var b=new Blob([h],{type:'text/csv;charset=utf-8'});
  var u=URL.createObjectURL(b); var a=document.createElement('a'); a.href=u; a.download='献血报名_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a); a.click(); setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);},200);
}

function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

// ==================== 自动刷新 (30秒) ====================
var autoTimer = null;
var autoCountdown = 0;

function toggleAuto() {
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
    document.getElementById('autoBtn').textContent = '▶ 自动';
    document.getElementById('autoBtn').style.color = '';
    document.getElementById('syncStatus').textContent = '自动刷新已关闭';
    return;
  }
  autoCountdown = 30;
  document.getElementById('autoBtn').textContent = '⏸ 自动 30s';
  document.getElementById('autoBtn').style.color = '#27ae60';
  document.getElementById('syncStatus').textContent = '自动刷新中...';
  autoTimer = setInterval(function() {
    autoCountdown--;
    if (autoCountdown <= 0) {
      loadData();
      autoCountdown = 30;
    }
    document.getElementById('autoBtn').textContent = '⏸ 自动 ' + autoCountdown + 's';
  }, 1000);
}
</script>
</body>
</html>
